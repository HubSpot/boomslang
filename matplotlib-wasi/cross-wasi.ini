[binaries]
c = '/opt/wasi-sdk/bin/clang'
cpp = '/opt/wasi-sdk/bin/clang++'
ar = '/opt/wasi-sdk/bin/llvm-ar'
nm = '/opt/wasi-sdk/bin/llvm-nm'
ranlib = '/opt/wasi-sdk/bin/llvm-ranlib'
strip = '/opt/wasi-sdk/bin/llvm-strip'
pkgconfig = '/usr/bin/pkg-config'
# Host python runs meson-generated build scripts.
python = '/usr/bin/python3'

[built-in options]
# Same numpy ILP32 quirk as pandas-wasi: -DPY_LONG_LONG="long long" ensures
# npy_longlong typedefs to 8-byte long long regardless of include order.
# -fignore-exceptions silences throws in ft2font_wrapper.cpp + pybind11; error
# paths become undefined but happy-path mpld3 never hits them. _path depends
# on Agg (vendored under extern/agg24-svn/); ft2font depends on freetype
# subproject built from packagecache/.
c_args = ['--sysroot=/opt/wasi-sdk/share/wasi-sysroot', '-I/build/shim-include', '-I/tmp/cpython-wasi/include/python3.14', '-D_WASI_EMULATED_SIGNAL', '-D_WASI_EMULATED_GETPID', '-D_WASI_EMULATED_PROCESS_CLOCKS', '-DPY_LONG_LONG=long long']
cpp_args = ['--sysroot=/opt/wasi-sdk/share/wasi-sysroot', '-I/build/shim-include', '-I/tmp/cpython-wasi/include/python3.14', '-D_WASI_EMULATED_SIGNAL', '-D_WASI_EMULATED_GETPID', '-D_WASI_EMULATED_PROCESS_CLOCKS', '-fignore-exceptions', '-DPY_LONG_LONG=long long']
c_link_args = ['--sysroot=/opt/wasi-sdk/share/wasi-sysroot']
cpp_link_args = ['--sysroot=/opt/wasi-sdk/share/wasi-sysroot']

[host_machine]
system = 'wasi'
cpu_family = 'wasm32'
cpu = 'wasm32'
endian = 'little'

[properties]
needs_exe_wrapper = true
longdouble_format = 'IEEE_DOUBLE_LE'
