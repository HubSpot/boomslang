name: Full Source Build

on:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Full source build
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    permissions:
      contents: read
    env:
      CI: true
      DOCKER_BUILDKIT: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Report initial disk usage
        run: |
          df -h
          docker system df || true

      - name: Free hosted runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/.ghcup
          docker system prune -af || true
          df -h

      - name: Cache Mill outputs
        uses: actions/cache@v4
        with:
          path: |
            out
            ~/.cache/mill
          key: ${{ runner.os }}-mill-${{ hashFiles('build.mill', 'mill', 'pom.xml', 'core/pom.xml', 'tests/pom.xml', 'benchmarks/pom.xml', 'cpython/**', 'python-host/**', 'python-host-core/**', 'extensions/**', 'boomslang-hostgen/**') }}
          restore-keys: |
            ${{ runner.os }}-mill-

      - name: Build runtime from source
        run: |
          ./mill artifacts.setContainerCli --cli docker
          ./mill artifacts.cacheStatus
          docker build --progress=plain -t boomslang-builder cpython/builder/
          ./mill --jobs 0 artifacts.installAll
          ./mill artifacts.cacheStatus

      - name: Validate generated runtime resources
        run: |
          python3 - <<'PY'
          from pathlib import Path

          wasm = Path("core/src/main/resources/python/bin/boomslang.wasm")
          stdlib = Path("core/src/main/resources/python/usr/local/lib/python3.14")

          if not wasm.is_file():
              raise SystemExit("boomslang.wasm was not generated")
          if wasm.read_bytes()[:4] != b"\0asm":
              raise SystemExit("boomslang.wasm is not a WASM binary")
          if not stdlib.is_dir():
              raise SystemExit("Python stdlib resource tree was not generated")
          PY

      - name: Remove LFS stdlib zip before Mill packaging
        run: rm -f core/src/main/resources/python/stdlib.zip

      - name: Mill package
        run: ./mill --jobs 0 build

      - name: Mill integration tests
        run: ./mill --jobs 0 test

      - name: Package runtime artifacts
        run: |
          set -euo pipefail
          mkdir -p dist/stage/python
          cp core/src/main/resources/python/bin/boomslang.wasm "dist/boomslang-${GITHUB_SHA}.wasm"
          cp -R core/src/main/resources/python/bin dist/stage/python/
          cp -R core/src/main/resources/python/usr dist/stage/python/
          cp -R core/src/main/resources/python-overlay dist/stage/python-overlay
          tar -C dist/stage -czf "dist/boomslang-runtime-${GITHUB_SHA}.tar.gz" python python-overlay
          sha256sum \
            "dist/boomslang-${GITHUB_SHA}.wasm" \
            "dist/boomslang-runtime-${GITHUB_SHA}.tar.gz" \
            > "dist/boomslang-${GITHUB_SHA}.sha256"
          rm -rf dist/stage

      - name: Upload runtime artifacts
        uses: actions/upload-artifact@v7
        with:
          name: boomslang-runtime-${{ github.sha }}
          path: dist/*
          if-no-files-found: error
          retention-days: 90

      - name: Report final disk usage
        if: always()
        run: |
          df -h
          docker system df || true

  python-wheel:
    name: Python wheel
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download runtime artifacts
        uses: actions/download-artifact@v8
        with:
          name: boomslang-runtime-${{ github.sha }}
          path: dist

      - name: Install runtime resources
        run: |
          set -euo pipefail
          mkdir -p stage
          tar -xzf "dist/boomslang-runtime-${GITHUB_SHA}.tar.gz" -C stage
          mkdir -p core/src/main/resources/python
          cp -R stage/python/bin stage/python/usr core/src/main/resources/python/

      - name: Stage runtime into Python package
        run: ./scripts/stage-python-runtime.sh

      - name: Resolve wheel version
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" == v* ]]; then
            echo "BOOMSLANG_WHEEL_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "BOOMSLANG_WHEEL_VERSION=0.0.0+g${GITHUB_SHA::12}" >> "$GITHUB_ENV"
          fi

      - name: Build wheel
        run: |
          pip install build
          ./scripts/build-python-wheel.sh

      - name: Test installed wheel
        run: |
          python -m venv /tmp/wheel-venv
          /tmp/wheel-venv/bin/pip install boomslang-py/dist/*.whl pytest
          cd /tmp
          /tmp/wheel-venv/bin/pytest "$GITHUB_WORKSPACE/boomslang-py/tests"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: boomslang-wheel-${{ github.sha }}
          path: boomslang-py/dist/*.whl
          if-no-files-found: error
          retention-days: 90

  release:
    name: Publish runtime release
    needs: [build, python-wheel]
    if: |
      github.event_name == 'push' &&
      (
        startsWith(github.ref, 'refs/tags/v') ||
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/master'
      )
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download runtime artifacts
        uses: actions/download-artifact@v8
        with:
          name: boomslang-runtime-${{ github.sha }}
          path: dist

      - name: Download Python wheel
        uses: actions/download-artifact@v8
        with:
          name: boomslang-wheel-${{ github.sha }}
          path: dist

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            release_tag="$GITHUB_REF_NAME"
            release_title="Boomslang ${GITHUB_REF_NAME}"
            release_notes="Boomslang runtime assets for ${GITHUB_REF_NAME}."
            prerelease_args=()
            target_args=()
          else
            release_tag="build-${GITHUB_SHA}"
            release_title="Boomslang ${GITHUB_SHA}"
            release_notes="Per-commit Boomslang runtime assets for ${GITHUB_SHA} from ${GITHUB_REF_NAME}."
            prerelease_args=(--prerelease)
            target_args=(--target "$GITHUB_SHA")
          fi

          if gh release view "$release_tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$release_tag" dist/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$release_tag" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              "${target_args[@]}" \
              "${prerelease_args[@]}" \
              --title "$release_title" \
              --notes "$release_notes"
          fi
