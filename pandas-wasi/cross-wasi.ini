[binaries]
c = '/opt/wasi-sdk/bin/clang'
cpp = '/opt/wasi-sdk/bin/clang++'
ar = '/opt/wasi-sdk/bin/llvm-ar'
nm = '/opt/wasi-sdk/bin/llvm-nm'
ranlib = '/opt/wasi-sdk/bin/llvm-ranlib'
strip = '/opt/wasi-sdk/bin/llvm-strip'
pkgconfig = '/usr/bin/pkg-config'
# Host python runs meson-generated build scripts (generate_numpy_api.py, etc.)
python = '/usr/bin/python3'

[built-in options]
# -DPY_LONG_LONG="long long" is load-bearing for pandas. pandas's vendored
# np_datetime.c includes <numpy/ndarraytypes.h> before <Python.h>, so
# PY_LONG_LONG (normally set by pyport.h) isn't defined when numpy's
# npy_common.h processes its typedef chain. The fallback branch picks
#     typedef long npy_longlong;
# which on wasm32 ILP32 gives npy_longlong = 4 bytes, and then
#     typedef npy_longlong npy_int64;
# giving npy_int64 = 4 bytes — which disagrees with numpy's own build
# (npy_int64 = long long = 8 bytes) and produces wasm-ld function-signature
# mismatches + Cython buffer-dtype mismatches at runtime. Preemptively
# defining PY_LONG_LONG forces the correct `typedef long long npy_longlong`
# regardless of include order.
c_args = ['--sysroot=/opt/wasi-sdk/share/wasi-sysroot', '-I/tmp/cpython-wasi/include/python3.14', '-D_WASI_EMULATED_SIGNAL', '-D_WASI_EMULATED_GETPID', '-D_WASI_EMULATED_PROCESS_CLOCKS', '-DPY_LONG_LONG=long long']
cpp_args = ['--sysroot=/opt/wasi-sdk/share/wasi-sysroot', '-I/tmp/cpython-wasi/include/python3.14', '-D_WASI_EMULATED_SIGNAL', '-D_WASI_EMULATED_GETPID', '-D_WASI_EMULATED_PROCESS_CLOCKS', '-fignore-exceptions', '-DPY_LONG_LONG=long long']
c_link_args = ['--sysroot=/opt/wasi-sdk/share/wasi-sysroot']
cpp_link_args = ['--sysroot=/opt/wasi-sdk/share/wasi-sysroot']

[host_machine]
system = 'wasi'
cpu_family = 'wasm32'
cpu = 'wasm32'
endian = 'little'

[properties]
needs_exe_wrapper = true
longdouble_format = 'IEEE_DOUBLE_LE'
# numpy runs tryruns at configure time to probe the target. Without an exe
# wrapper, those tryruns fail. Provide safe defaults so configure proceeds.
# These values match wasm32-wasi libc behavior.
has_function_hasenv = false
