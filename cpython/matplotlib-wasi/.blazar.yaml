provides:
  - matplotlib-wasi

# Depend on numpy-wasi — we consume its patched headers (include/numpy/)
# at build time (matplotlib's _path links against the numpy C API). No
# cycle: cpython-wasi depends on all of {numpy, pandas, matplotlib}-wasi
# and matplotlib-wasi only depends on numpy-wasi. This dep also doubles as
# the scheduling hint Blazar needs so the auto-generated _manifest sub-module
# waits for _amd64.
depends:
  - numpy-wasi

buildpack:
  name: Buildpack-Docker

enableBuildTargets:
  - amd64

# Request a Large build pod (32 vCPU / 64 GB). The ninja compile includes
# freetype + Agg (C++) + ft2font + _path. Large pods avoid CPU throttling.
buildResources:
  cpus: 32
  memoryMb: 65536

env:
  PLATFORM_ARCHS: "amd64"

before:
  - description: "Download numpy-wasi artifact for patched numpy headers"
    commands:
      - |
        set -ex
        COORDS="${GIT_HOST}-${GIT_USER}-${GIT_REPO}-${GIT_BRANCH}-numpy-wasi_amd64"
        MAIN_COORDS="${GIT_HOST}-${GIT_USER}-${GIT_REPO}-main-numpy-wasi_amd64"
        mkdir -p vendor
        if download-artifact -n "$COORDS" -b "$BUILD_NUMBER" -o vendor/numpy-wasi.tgz 2>/dev/null; then
            echo "Downloaded numpy-wasi from same build"
        elif download-artifact -n "$COORDS" -o vendor/numpy-wasi.tgz 2>/dev/null; then
            echo "Downloaded numpy-wasi from branch"
        elif download-artifact -n "$MAIN_COORDS" -o vendor/numpy-wasi.tgz 2>/dev/null; then
            echo "Downloaded numpy-wasi from main"
        else
            echo "ERROR: Could not download numpy-wasi artifact"
            exit 1
        fi
        ls -lh vendor/numpy-wasi.tgz

after:
  onSuccess:
    - description: "Extract and publish artifact tarball"
      commands:
        - CID=$(docker create "$PLATFORM_IMAGE" /bin/true) && docker cp "$CID:/artifact.tgz" artifact.tgz && docker rm "$CID" && touch .blazar_notify_deploy_service_and_upload_artifact_if_exists
